<body>

        <div class="center"> <button
        id="MyButton"

        <div class="center2">
  <button
    id="MyButton2"
    aria-label="Go to social media page"
  >
    Social Media
  </button>
</div>
          
          </div>

        <script>
          // Responsive orientation handler
          function handleOrientationChange() {
            if (window.innerWidth > window.innerHeight) {
              window.location.href = "pages/landscape.html";
            }
          }

          handleOrientationChange();
          window.addEventListener("resize", handleOrientationChange);
          window.addEventListener("orientationchange", handleOrientationChange);

          // Robust press-to-navigate helper that ensures the pressed state is visible even on fast taps
          function addPressNavigate(buttonId, className, href, delay = 180) {
            const btn = document.getElementById(buttonId);
            if (!btn) return;
            let navTimer = null;

            const navigate = () => { window.location.href = href; };

            const startPress = (e) => {
              // add visual state immediately
              btn.classList.add(className);
            };

            const endPressAndNavigate = (e) => {
              // ensure browser paints the pressed state before navigating
              // run on next frame then wait `delay` ms
              requestAnimationFrame(() => {
                if (navTimer) clearTimeout(navTimer);
                navTimer = setTimeout(navigate, delay);
              });
            };

            // pointer events cover mouse + touch in modern browsers
            btn.addEventListener('pointerdown', startPress);
            btn.addEventListener('pointerup', endPressAndNavigate);

            // also listen for pointercancel/leave to clean up
            btn.addEventListener('pointercancel', () => btn.classList.remove(className));
            btn.addEventListener('pointerleave', () => btn.classList.remove(className));

            // fallback for older touch-only devices
            btn.addEventListener('touchstart', startPress, {passive: true});
            btn.addEventListener('touchend', endPressAndNavigate);

            // click fallback (if pointer events not supported)
            btn.addEventListener('click', (e) => {
              e.preventDefault();
              startPress();
              requestAnimationFrame(() => setTimeout(navigate, delay));
            });
          }

          addPressNavigate('MyButton', 'clicked', 'pages/aboutme.html', 180);
          addPressNavigate('MyButton2', 'clicked2', 'pages/social.html', 180);
        </script>
